name: pesa_barbaadi
description: Split petrol costs with a friend
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.15.0
  # Auth
  google_sign_in: ^6.2.1
  # State
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Routing
  go_router: ^14.0.0
  # Export
  syncfusion_flutter_xlsio: ^25.1.41
  pdf: ^3.10.8
  share_plus: ^9.0.0
  path_provider: ^2.1.3
  # Charts
  fl_chart: ^0.67.0
  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
